<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="script.js">
</head>
<body>
    <header>
        <nav>
            <img src="assets/gordo dog.png" alt="">
            <h1>Xoza Adoções</h1>
            <img src="assets/gordo dog.png" alt="">
        </nav>
    </header>

<div class="fundo_cadastro">
        <H1 class="titulo">Cadastro para adoção</H1>
        <h2>Preencha as informações para adotar a Nina</h4><br><br>

        <form id="form_adacao">
            <input type="text" id="nome" placeholder="Nome completo"><br><br>

            <input type="text" id="email" placeholder="Email"><br><br>

            <input type="text" id="telefone" placeholder="Telefone"><br><br>

            <input type="number" id="cpf" placeholder="cpf"><br><br>

            <input type="number" id="idade" placeholder="idade"><br><br>

            <input type="text" id="cidade" placeholder="cidade"><br><br>

            <label>Moradia:</label>
                <select id="moradia">
                    <option value="selecione"></option>
                    <option value="casa">casa</option>
                    <option value="apartamento">apartamento</option>
                </select><br><br>

            <label>Possui quintal:</label>
            <select  id="quintal">
                    <option value="selecione"></option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
            </select><br><br>

            <label>Ja teve pet?:</label>
            <select id="pet">
                    <option value="selecione"></option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
            </select><br><br>

            <input type="text" id="horas" placeholder="Horas sozinho por dia"><br><br>

            <input type="text" id="motivo" placeholder="Motivo da adoção"><br><br>

            <label>Tem condições financeiras:</label>
            <select id="condicoes">
                    <option value="selecione"></option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>

            </select><br><br>
            <label>Quando decidiu adotar?</label>
            <select id="decisao">
                <option value="Selecione"></option>
                <option value="Hoje">Hoje</option>
                <option value="Alguns_dias">A alguns dias</option>
                <option value="mais_tempo">A algum tempos atrás</option>
            </select><br><br>

            <label>Possui espaço externo para o pet em sua residencia?</label>
            <select id="espaço">
                <option value="Selecione"></option>
                <option value="sim">Sim</option>
                <option value="nao">Não</option>
            </select><br><br>

            <input type="checkbox" id="termo"></form>
            <label for="termo">Aceito os termos</label><br>

            <button type="submit">Enviar</button>





    </form>

<script src="script.js"></script>
</body>
</html>
